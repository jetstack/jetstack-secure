suite: test rbac
templates:
  - rbac.yaml

tests:
  # Test that all RBAC resources are created
  - it: should create all RBAC resources
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    asserts:
      - hasDocuments:
          count: 8

  # Test Role for event emission
  - it: should create Role for event emission
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-event-emitted
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["events"]
            verbs: ["create"]

  # Test RoleBinding for event emission
  - it: should create RoleBinding for event emission
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-event-emitted
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-discovery-agent-event-emitted
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-discovery-agent
            namespace: NAMESPACE

  # Test ClusterRoleBinding for cluster viewer
  - it: should create ClusterRoleBinding for cluster viewer
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 2
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-cluster-viewer
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: view
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-discovery-agent
            namespace: NAMESPACE

  # Test ClusterRole for secret reader
  - it: should create ClusterRole for secret reader
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 3
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-secret-reader
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch"]

  # Test ClusterRoleBinding for secret reader
  - it: should create ClusterRoleBinding for secret reader
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 4
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-secret-reader
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-discovery-agent-secret-reader

  # Test ClusterRole for RBAC reader
  - it: should create ClusterRole for RBAC reader
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 5
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-rbac-reader
      - contains:
          path: rules[0].resources
          content: roles
      - contains:
          path: rules[0].resources
          content: clusterroles
      - contains:
          path: rules[0].resources
          content: rolebindings
      - contains:
          path: rules[0].resources
          content: clusterrolebindings

  # Test ClusterRoleBinding for RBAC reader
  - it: should create ClusterRoleBinding for RBAC reader
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 6
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-rbac-reader
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-discovery-agent-rbac-reader

  # Test ClusterRoleBinding for OIDC discovery
  - it: should create ClusterRoleBinding for OIDC discovery
    set:
      config.clusterName: test-cluster
      config.tsgID: "123456"
    documentIndex: 7
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: RELEASE-NAME-discovery-agent-oidc-discovery
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: system:service-account-issuer-discovery
